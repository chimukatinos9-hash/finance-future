<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Future Login</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#151515;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
}

h1{
color:#f4b400;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#f4b400;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

a{
color:#f4b400;
text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">

<h1>Finance Future</h1>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<p style="margin-top:15px;">
<a href="#">Forgot Password?</a>
</p>

<p style="margin-top:10px;">
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

</body>
</html>
